version: '3.8'

services:
  # 1. TimescaleDB (PostgreSQL) Database
  postgres:
    image: timescale/timescaledb:latest-pg15
    container_name: sharebot_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-sharebot_db}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 2. Redis Cache & Task Queue Broker
  redis:
    image: redis:7-alpine
    container_name: sharebot_redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_pass} --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_pass}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # 3. FastAPI Backend Service
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sharebot_api
    restart: always
    environment:
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-sharebot_db}
      - SECRET_KEY=${SECRET_KEY:-SUPER_SECRET_KEY_CHANGE_THIS_IN_PRODUCTION}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
    ports:
      - "8001:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # 4. React Frontend (Nginx Static Host & Proxy)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sharebot_frontend
    restart: always
    ports:
      - "8080:80"
    depends_on:
      - api

volumes:
  pgdata:
  redisdata:
