name: ShareBot CI/CD Production Deployment

on:
  push:
    branches: [ "main" ]

jobs:
  # 1. Validation & Test Job
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Python checks
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Lint Python Code
        run: |
          # stop the build if there are Python syntax errors or undefined names
          flake8 app --count --select=E9,F63,F7,F82 --show-source --statistics

      # Frontend compilation checks
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'

      - name: Install Frontend Dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build Frontend Application
        working-directory: ./frontend
        run: npm run build

  # 2. Docker Build & Production Server Deploy Job
  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Setup SSH Connection to Ubuntu server
      - name: Deploy to Ubuntu Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            # Navigate to application workspace
            cd /home/${{ secrets.SSH_USERNAME }}/sharebot
            
            # Pull latest changes
            git pull origin main
            
            # Re-build and re-start containers
            docker compose down
            docker compose up --build -d
            
            # Run database migrations
            docker compose exec -T api alembic upgrade head
            
            # Seed initial databases if required
            docker compose exec -T api python seed_data.py
            
            # Prune obsolete images to reclaim space
            docker image prune -f
