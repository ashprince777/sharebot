services:
  # FastAPI Backend Web Service
  - type: web
    name: sharebot-api
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: alembic upgrade head && python seed_data.py && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DATABASE_URL
        fromDatabase:
          name: sharebot-db
          property: connectionString
      - key: BACKEND_CORS_ORIGINS
        value: "https://sharebot-alpha.vercel.app,http://localhost:3000,http://localhost:5173"
      - key: SECRET_KEY
        generateValue: true
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false

databases:
  # PostgreSQL Database Instance
  - name: sharebot-db
    plan: free
